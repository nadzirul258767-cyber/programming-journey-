<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>font weight with number</title>
    <style>
        .wn-100 {
        font-weight: 100;
        }
        .wn-400 {
        font-weight: 400;
        }
        .wn-900 {
        font-weight: 700;
        }
        .wn-900 {
        font-weight: 900;
        }
    </style>
</head>
<body>
    <p clas="wn-100">This is lighter weight teks.</p>
    <p clas="wn-400">This is normal weight teks.</p>
    <p clas="wn-700">This is bold weight teks.</p>
    <p clas="wn-900">This is bolder weight teks.</p>
</body>
</html>
