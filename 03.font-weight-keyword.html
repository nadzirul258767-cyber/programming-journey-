<head>

    <title>font weight with kayword</title>
    <style>
        .w-ligter {
           font-weight: lighter;
        }
        .w-normal {
            font-weight: normal;
        }
        .w-bold {
            font-weight: bold;                       
        }
        .w-bolder {
            font-weight: bolder;                       
        }
    </style>
</head>
<body>
    <p class="w-lighter">This is lighter weight text.</p>
    <p clas="w-normal">this is normal weght text.</p>
    <p clas="w-bold">this is bold weght text.</p>
    <p clas="w-bolder">this is bolder weght text.</p>
</body>
</html>
